name: Tirerotate
options:
  bundleIdPrefix: com.shimondeitel.tirerotate
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Tirerotate:
    type: application
    platform: iOS
    sources:
      - path: Tirerotate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tirerotate
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Tirerotate/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TirerotateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TirerotateTests
      - path: Tirerotate.storekit
    dependencies:
      - target: Tirerotate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tirerotate.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TirerotateUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TirerotateUITests
    dependencies:
      - target: Tirerotate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tirerotate.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Tirerotate:
    build:
      targets:
        Tirerotate: all
        TirerotateTests: [test]
        TirerotateUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Tirerotate.storekit
    test:
      config: Debug
      storeKitConfiguration: Tirerotate.storekit
      targets:
        - TirerotateTests
        - TirerotateUITests
    archive:
      config: Release
