<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home — Tire Rotation Tracker</title>
<style>
  body{margin:0;background:#141414;color:#EDF7F6;font-family:-apple-system,Helvetica,Arial,sans-serif;
       display:flex;justify-content:center;padding:60px 20px;}
  .wrap{max-width:640px;text-align:center;}
  h1{color:#5FC9C0;font-size:2rem;}
  a{color:#5FC9C0;}
  .card{background:rgba(255,255,255,0.04);border-radius:16px;padding:24px;margin-top:24px;text-align:left;line-height:1.6;}
  footer{margin-top:40px;font-size:0.85rem;opacity:0.6;}

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #5FC9C055 0%, #5FC9C000 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div><div class="wrap">
<h1>Tire Rotation Tracker</h1>
<p>Keep a record of tire rotations, tread depth, and replacement dates.</p>
<div class="card">
<strong>Free:</strong> Log rotation date and mileage per axle<br/>
<strong>Pro:</strong> Tread-depth photo log with wear-pattern history graph
</div>
